<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Site Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 320px;
            padding: 0px;
            text-align: center;
            background: linear-gradient(135deg, #fbfbfc, #fcfcfd);
            color: white;
            border-radius: 0px;
        }

        #headerContainer {
            width: 100%;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        #riskImage {
            width: 70px;
            height: 70px;
            display: none;
            margin: 8px auto;
        }

        #result {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            background: #9aa5f9;
            border: none;
            padding: 8px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            border-radius: 5px;
            width: 80%;
            margin: 4px 0;
            transition: 0.3s;
        }

        button:hover {
            background: #9aa5f9;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Website Security Analyzer</h1>
        <div id="security-info" class="ready">Analyzing...</div>
        <img class="risk-icon" id="risk" alt="Risk status icon">
        <button id="scan-again" aria-label="Scan website for safety">Scan Again</button>
        <button id="reportBtn" aria-label="Report website as phishing">Report Phishing</button>
        <button id="viewReportedSites" aria-label="View reported phishing sites">View Reported Sites</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
